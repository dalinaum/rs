<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>미트박스 (475460)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>미트박스 (475460)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-02-06", "open": 8200.0, "high": 8400.0, "low": 7700.0, "close": 8120.0}, {"time": "2026-02-09", "open": 8120.0, "high": 8260.0, "low": 8070.0, "close": 8140.0}, {"time": "2026-02-10", "open": 8140.0, "high": 8300.0, "low": 8090.0, "close": 8250.0}, {"time": "2026-02-11", "open": 8250.0, "high": 8390.0, "low": 8180.0, "close": 8380.0}, {"time": "2026-02-12", "open": 8380.0, "high": 8390.0, "low": 8210.0, "close": 8290.0}, {"time": "2026-02-13", "open": 8290.0, "high": 8350.0, "low": 8060.0, "close": 8190.0}, {"time": "2026-02-19", "open": 8190.0, "high": 8280.0, "low": 8040.0, "close": 8240.0}, {"time": "2026-02-20", "open": 8180.0, "high": 8250.0, "low": 8140.0, "close": 8150.0}, {"time": "2026-02-23", "open": 8100.0, "high": 8900.0, "low": 8000.0, "close": 8080.0}, {"time": "2026-02-24", "open": 8050.0, "high": 8280.0, "low": 8050.0, "close": 8150.0}, {"time": "2026-02-25", "open": 8190.0, "high": 8260.0, "low": 8030.0, "close": 8070.0}, {"time": "2026-02-26", "open": 8020.0, "high": 8110.0, "low": 7780.0, "close": 7780.0}, {"time": "2026-02-27", "open": 7800.0, "high": 7880.0, "low": 7520.0, "close": 7520.0}];
    const ma50Data = [{"time": "2026-02-06", "value": 8463.8}, {"time": "2026-02-09", "value": 8460.2}, {"time": "2026-02-10", "value": 8454.0}, {"time": "2026-02-11", "value": 8449.6}, {"time": "2026-02-12", "value": 8445.2}, {"time": "2026-02-13", "value": 8435.2}, {"time": "2026-02-19", "value": 8422.8}, {"time": "2026-02-20", "value": 8410.4}, {"time": "2026-02-23", "value": 8396.0}, {"time": "2026-02-24", "value": 8386.2}, {"time": "2026-02-25", "value": 8373.8}, {"time": "2026-02-26", "value": 8357.0}, {"time": "2026-02-27", "value": 8334.2}];
    const ma150Data = [{"time": "2026-02-06", "value": 10439.8}, {"time": "2026-02-09", "value": 10402.87}, {"time": "2026-02-10", "value": 10362.07}, {"time": "2026-02-11", "value": 10325.53}, {"time": "2026-02-12", "value": 10286.2}, {"time": "2026-02-13", "value": 10244.87}, {"time": "2026-02-19", "value": 10186.47}, {"time": "2026-02-20", "value": 10129.73}, {"time": "2026-02-23", "value": 10073.13}, {"time": "2026-02-24", "value": 10012.47}, {"time": "2026-02-25", "value": 9947.73}, {"time": "2026-02-26", "value": 9885.87}, {"time": "2026-02-27", "value": 9823.73}];
    const ma200Data = [{"time": "2026-02-06", "value": 11083.8}, {"time": "2026-02-09", "value": 11045.5}, {"time": "2026-02-10", "value": 11009.3}, {"time": "2026-02-11", "value": 10978.9}, {"time": "2026-02-12", "value": 10949.55}, {"time": "2026-02-13", "value": 10915.75}, {"time": "2026-02-19", "value": 10884.7}, {"time": "2026-02-20", "value": 10849.85}, {"time": "2026-02-23", "value": 10818.0}, {"time": "2026-02-24", "value": 10796.6}, {"time": "2026-02-25", "value": 10778.15}, {"time": "2026-02-26", "value": 10757.0}, {"time": "2026-02-27", "value": 10737.25}];
    const rsData = [{"time": "2026-02-06", "value": 6}, {"time": "2026-02-09", "value": 10}, {"time": "2026-02-10", "value": 10}, {"time": "2026-02-11", "value": 15}, {"time": "2026-02-12", "value": 16}, {"time": "2026-02-13", "value": 19}, {"time": "2026-02-19", "value": 19}, {"time": "2026-02-20", "value": 16}, {"time": "2026-02-23", "value": 13}, {"time": "2026-02-24", "value": 13}, {"time": "2026-02-25", "value": 12}, {"time": "2026-02-26", "value": 13}, {"time": "2026-02-27", "value": 10}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
