<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한텍 (098070)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>한텍 (098070)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-04-02", "open": 48050.0, "high": 50300.0, "low": 46100.0, "close": 48450.0}, {"time": "2026-04-03", "open": 49250.0, "high": 52100.0, "low": 49150.0, "close": 49300.0}, {"time": "2026-04-06", "open": 49900.0, "high": 51400.0, "low": 49000.0, "close": 49350.0}, {"time": "2026-04-07", "open": 48050.0, "high": 48300.0, "low": 43700.0, "close": 44200.0}, {"time": "2026-04-08", "open": 43700.0, "high": 44500.0, "low": 41800.0, "close": 43950.0}, {"time": "2026-04-09", "open": 44100.0, "high": 46150.0, "low": 43300.0, "close": 45250.0}, {"time": "2026-04-10", "open": 45300.0, "high": 45350.0, "low": 43800.0, "close": 44850.0}, {"time": "2026-04-13", "open": 44350.0, "high": 46200.0, "low": 44200.0, "close": 44400.0}, {"time": "2026-04-14", "open": 44950.0, "high": 44950.0, "low": 42700.0, "close": 43450.0}, {"time": "2026-04-15", "open": 43800.0, "high": 47400.0, "low": 43700.0, "close": 45350.0}, {"time": "2026-04-16", "open": 45550.0, "high": 45950.0, "low": 44450.0, "close": 44750.0}, {"time": "2026-04-17", "open": 45200.0, "high": 45450.0, "low": 43550.0, "close": 44300.0}];
    const ma50Data = [{"time": "2026-04-02", "value": 39640.0}, {"time": "2026-04-03", "value": 39936.0}, {"time": "2026-04-06", "value": 40197.0}, {"time": "2026-04-07", "value": 40330.0}, {"time": "2026-04-08", "value": 40452.0}, {"time": "2026-04-09", "value": 40614.0}, {"time": "2026-04-10", "value": 40783.0}, {"time": "2026-04-13", "value": 40926.0}, {"time": "2026-04-14", "value": 41059.0}, {"time": "2026-04-15", "value": 41218.0}, {"time": "2026-04-16", "value": 41389.0}, {"time": "2026-04-17", "value": 41580.0}];
    const ma150Data = [{"time": "2026-04-02", "value": 39578.33}, {"time": "2026-04-03", "value": 39637.0}, {"time": "2026-04-06", "value": 39688.33}, {"time": "2026-04-07", "value": 39670.33}, {"time": "2026-04-08", "value": 39662.67}, {"time": "2026-04-09", "value": 39653.0}, {"time": "2026-04-10", "value": 39619.33}, {"time": "2026-04-13", "value": 39588.67}, {"time": "2026-04-14", "value": 39553.33}, {"time": "2026-04-15", "value": 39542.33}, {"time": "2026-04-16", "value": 39521.0}, {"time": "2026-04-17", "value": 39469.0}];
    const ma200Data = [{"time": "2026-04-02", "value": 38814.75}, {"time": "2026-04-03", "value": 38873.25}, {"time": "2026-04-06", "value": 38929.25}, {"time": "2026-04-07", "value": 38954.75}, {"time": "2026-04-08", "value": 38983.75}, {"time": "2026-04-09", "value": 39009.75}, {"time": "2026-04-10", "value": 39042.5}, {"time": "2026-04-13", "value": 39078.5}, {"time": "2026-04-14", "value": 39098.25}, {"time": "2026-04-15", "value": 39136.75}, {"time": "2026-04-16", "value": 39167.75}, {"time": "2026-04-17", "value": 39194.25}];
    const rsData = [{"time": "2026-04-02", "value": 89}, {"time": "2026-04-03", "value": 87}, {"time": "2026-04-06", "value": 87}, {"time": "2026-04-07", "value": 82}, {"time": "2026-04-08", "value": 80}, {"time": "2026-04-09", "value": 81}, {"time": "2026-04-10", "value": 78}, {"time": "2026-04-13", "value": 81}, {"time": "2026-04-14", "value": 79}, {"time": "2026-04-15", "value": 74}, {"time": "2026-04-16", "value": 69}, {"time": "2026-04-17", "value": 67}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
