<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>에이아이코리아 (364950)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>에이아이코리아 (364950)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-05-14", "open": 6340.0, "high": 6460.0, "low": 6080.0, "close": 6190.0}, {"time": "2026-05-15", "open": 6250.0, "high": 6250.0, "low": 5850.0, "close": 5960.0}, {"time": "2026-05-18", "open": 5960.0, "high": 6000.0, "low": 5720.0, "close": 5920.0}, {"time": "2026-05-19", "open": 6000.0, "high": 6000.0, "low": 5730.0, "close": 5830.0}, {"time": "2026-05-20", "open": 5780.0, "high": 5990.0, "low": 5570.0, "close": 5630.0}, {"time": "2026-05-21", "open": 5730.0, "high": 6000.0, "low": 5730.0, "close": 5840.0}, {"time": "2026-05-22", "open": 5990.0, "high": 6190.0, "low": 5950.0, "close": 6190.0}, {"time": "2026-05-26", "open": 6170.0, "high": 6290.0, "low": 5980.0, "close": 6020.0}, {"time": "2026-05-27", "open": 6020.0, "high": 6030.0, "low": 5590.0, "close": 5660.0}];
    const ma50Data = [{"time": "2026-05-14", "value": 6569.8}, {"time": "2026-05-15", "value": 6578.4}, {"time": "2026-05-18", "value": 6575.2}, {"time": "2026-05-19", "value": 6570.0}, {"time": "2026-05-20", "value": 6573.4}, {"time": "2026-05-21", "value": 6574.6}, {"time": "2026-05-22", "value": 6577.6}, {"time": "2026-05-26", "value": 6575.0}, {"time": "2026-05-27", "value": 6562.6}];
    const ma150Data = [{"time": "2026-05-14", "value": 8111.6}, {"time": "2026-05-15", "value": 8074.87}, {"time": "2026-05-18", "value": 8045.07}, {"time": "2026-05-19", "value": 8015.8}, {"time": "2026-05-20", "value": 7985.8}, {"time": "2026-05-21", "value": 7954.93}, {"time": "2026-05-22", "value": 7927.53}, {"time": "2026-05-26", "value": 7899.67}, {"time": "2026-05-27", "value": 7865.93}];
    const ma200Data = [{"time": "2026-05-14", "value": 8278.9}, {"time": "2026-05-15", "value": 8265.75}, {"time": "2026-05-18", "value": 8250.85}, {"time": "2026-05-19", "value": 8237.9}, {"time": "2026-05-20", "value": 8224.6}, {"time": "2026-05-21", "value": 8212.7}, {"time": "2026-05-22", "value": 8202.9}, {"time": "2026-05-26", "value": 8192.6}, {"time": "2026-05-27", "value": 8181.2}];
    const rsData = [{"time": "2026-05-14", "value": 6}, {"time": "2026-05-15", "value": 5}, {"time": "2026-05-18", "value": 5}, {"time": "2026-05-19", "value": 5}, {"time": "2026-05-20", "value": 6}, {"time": "2026-05-21", "value": 8}, {"time": "2026-05-22", "value": 9}, {"time": "2026-05-26", "value": 9}, {"time": "2026-05-27", "value": 8}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
