<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>더즌 (462860)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>더즌 (462860)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-04-06", "open": 3220.0, "high": 3890.0, "low": 3200.0, "close": 3420.0}, {"time": "2026-04-07", "open": 3330.0, "high": 3440.0, "low": 3185.0, "close": 3220.0}, {"time": "2026-04-08", "open": 3270.0, "high": 3445.0, "low": 3270.0, "close": 3435.0}, {"time": "2026-04-09", "open": 3410.0, "high": 3455.0, "low": 3360.0, "close": 3375.0}, {"time": "2026-04-10", "open": 3385.0, "high": 3595.0, "low": 3375.0, "close": 3455.0}, {"time": "2026-04-13", "open": 3440.0, "high": 3600.0, "low": 3385.0, "close": 3585.0}, {"time": "2026-04-14", "open": 3645.0, "high": 3765.0, "low": 3640.0, "close": 3640.0}, {"time": "2026-04-15", "open": 3675.0, "high": 3950.0, "low": 3670.0, "close": 3805.0}, {"time": "2026-04-16", "open": 3880.0, "high": 3945.0, "low": 3750.0, "close": 3875.0}, {"time": "2026-04-17", "open": 3890.0, "high": 3945.0, "low": 3660.0, "close": 3895.0}, {"time": "2026-04-20", "open": 3880.0, "high": 3935.0, "low": 3820.0, "close": 3860.0}];
    const ma50Data = [{"time": "2026-04-06", "value": 4074.2}, {"time": "2026-04-07", "value": 4065.8}, {"time": "2026-04-08", "value": 4060.8}, {"time": "2026-04-09", "value": 4035.0}, {"time": "2026-04-10", "value": 4006.1}, {"time": "2026-04-13", "value": 3977.6}, {"time": "2026-04-14", "value": 3954.3}, {"time": "2026-04-15", "value": 3924.4}, {"time": "2026-04-16", "value": 3893.7}, {"time": "2026-04-17", "value": 3867.8}, {"time": "2026-04-20", "value": 3840.0}];
    const ma150Data = [{"time": "2026-04-06", "value": 4169.73}, {"time": "2026-04-07", "value": 4155.13}, {"time": "2026-04-08", "value": 4141.7}, {"time": "2026-04-09", "value": 4129.6}, {"time": "2026-04-10", "value": 4118.5}, {"time": "2026-04-13", "value": 4108.6}, {"time": "2026-04-14", "value": 4099.07}, {"time": "2026-04-15", "value": 4090.43}, {"time": "2026-04-16", "value": 4082.33}, {"time": "2026-04-17", "value": 4076.1}, {"time": "2026-04-20", "value": 4069.97}];
    const ma200Data = [{"time": "2026-04-06", "value": 4429.3}, {"time": "2026-04-07", "value": 4427.23}, {"time": "2026-04-08", "value": 4426.15}, {"time": "2026-04-09", "value": 4422.05}, {"time": "2026-04-10", "value": 4417.73}, {"time": "2026-04-13", "value": 4410.68}, {"time": "2026-04-14", "value": 4404.25}, {"time": "2026-04-15", "value": 4396.88}, {"time": "2026-04-16", "value": 4392.12}, {"time": "2026-04-17", "value": 4385.6}, {"time": "2026-04-20", "value": 4380.6}];
    const rsData = [{"time": "2026-04-06", "value": 62}, {"time": "2026-04-07", "value": 49}, {"time": "2026-04-08", "value": 56}, {"time": "2026-04-09", "value": 59}, {"time": "2026-04-10", "value": 57}, {"time": "2026-04-13", "value": 65}, {"time": "2026-04-14", "value": 67}, {"time": "2026-04-15", "value": 66}, {"time": "2026-04-16", "value": 69}, {"time": "2026-04-17", "value": 76}, {"time": "2026-04-20", "value": 74}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
