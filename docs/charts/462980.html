<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>아이지넷 (462980)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>아이지넷 (462980)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-02-12", "open": 1954.0, "high": 1960.0, "low": 1932.0, "close": 1944.0}, {"time": "2026-02-13", "open": 1944.0, "high": 1944.0, "low": 1921.0, "close": 1922.0}, {"time": "2026-02-19", "open": 1907.0, "high": 1936.0, "low": 1889.0, "close": 1894.0}, {"time": "2026-02-20", "open": 1904.0, "high": 2180.0, "low": 1887.0, "close": 2020.0}, {"time": "2026-02-23", "open": 2120.0, "high": 2135.0, "low": 2020.0, "close": 2040.0}, {"time": "2026-02-24", "open": 2020.0, "high": 2055.0, "low": 1990.0, "close": 2020.0}, {"time": "2026-02-25", "open": 2030.0, "high": 2115.0, "low": 2025.0, "close": 2065.0}, {"time": "2026-02-26", "open": 2065.0, "high": 2070.0, "low": 2000.0, "close": 2005.0}, {"time": "2026-02-27", "open": 2010.0, "high": 2130.0, "low": 1951.0, "close": 2110.0}, {"time": "2026-03-03", "open": 2315.0, "high": 2375.0, "low": 2150.0, "close": 2325.0}, {"time": "2026-03-04", "open": 2210.0, "high": 2315.0, "low": 2115.0, "close": 2150.0}];
    const ma50Data = [{"time": "2026-02-12", "value": 1974.14}, {"time": "2026-02-13", "value": 1974.3}, {"time": "2026-02-19", "value": 1973.22}, {"time": "2026-02-20", "value": 1974.9}, {"time": "2026-02-23", "value": 1977.1}, {"time": "2026-02-24", "value": 1979.14}, {"time": "2026-02-25", "value": 1982.4}, {"time": "2026-02-26", "value": 1984.5}, {"time": "2026-02-27", "value": 1988.4}, {"time": "2026-03-03", "value": 1996.82}, {"time": "2026-03-04", "value": 2001.54}];
    const ma150Data = [{"time": "2026-02-12", "value": 2235.04}, {"time": "2026-02-13", "value": 2227.55}, {"time": "2026-02-19", "value": 2219.75}, {"time": "2026-02-20", "value": 2212.71}, {"time": "2026-02-23", "value": 2205.98}, {"time": "2026-02-24", "value": 2199.05}, {"time": "2026-02-25", "value": 2192.65}, {"time": "2026-02-26", "value": 2186.01}, {"time": "2026-02-27", "value": 2180.08}, {"time": "2026-03-03", "value": 2175.71}, {"time": "2026-03-04", "value": 2170.28}];
    const ma200Data = [{"time": "2026-02-12", "value": 2471.33}, {"time": "2026-02-13", "value": 2462.64}, {"time": "2026-02-19", "value": 2454.43}, {"time": "2026-02-20", "value": 2446.59}, {"time": "2026-02-23", "value": 2438.91}, {"time": "2026-02-24", "value": 2431.84}, {"time": "2026-02-25", "value": 2425.24}, {"time": "2026-02-26", "value": 2418.49}, {"time": "2026-02-27", "value": 2412.36}, {"time": "2026-03-03", "value": 2407.49}, {"time": "2026-03-04", "value": 2402.84}];
    const rsData = [{"time": "2026-02-12", "value": 3}, {"time": "2026-02-13", "value": 4}, {"time": "2026-02-19", "value": 4}, {"time": "2026-02-20", "value": 7}, {"time": "2026-02-23", "value": 6}, {"time": "2026-02-24", "value": 6}, {"time": "2026-02-25", "value": 8}, {"time": "2026-02-26", "value": 8}, {"time": "2026-02-27", "value": 13}, {"time": "2026-03-03", "value": 30}, {"time": "2026-03-04", "value": 21}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
