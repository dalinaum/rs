<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서울보증보험 (031210)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>서울보증보험 (031210)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-03-27", "open": 54300.0, "high": 54300.0, "low": 52300.0, "close": 53800.0}, {"time": "2026-03-30", "open": 52400.0, "high": 53400.0, "low": 52000.0, "close": 53000.0}, {"time": "2026-03-31", "open": 53100.0, "high": 53500.0, "low": 52100.0, "close": 52200.0}, {"time": "2026-04-01", "open": 53400.0, "high": 53800.0, "low": 52000.0, "close": 52300.0}, {"time": "2026-04-02", "open": 50400.0, "high": 51100.0, "low": 48450.0, "close": 48900.0}, {"time": "2026-04-03", "open": 49050.0, "high": 49700.0, "low": 48150.0, "close": 48200.0}, {"time": "2026-04-06", "open": 48200.0, "high": 48700.0, "low": 47950.0, "close": 48200.0}, {"time": "2026-04-07", "open": 48450.0, "high": 48800.0, "low": 47000.0, "close": 47650.0}, {"time": "2026-04-08", "open": 48100.0, "high": 49100.0, "low": 47850.0, "close": 48200.0}, {"time": "2026-04-09", "open": 48600.0, "high": 48600.0, "low": 47000.0, "close": 47700.0}, {"time": "2026-04-10", "open": 47850.0, "high": 48250.0, "low": 47700.0, "close": 48000.0}, {"time": "2026-04-13", "open": 47450.0, "high": 47450.0, "low": 46400.0, "close": 47200.0}, {"time": "2026-04-14", "open": 47400.0, "high": 49100.0, "low": 47300.0, "close": 49100.0}, {"time": "2026-04-15", "open": 49250.0, "high": 49550.0, "low": 48850.0, "close": 49300.0}];
    const ma50Data = [{"time": "2026-03-27", "value": 53761.0}, {"time": "2026-03-30", "value": 53915.0}, {"time": "2026-03-31", "value": 54035.0}, {"time": "2026-04-01", "value": 54153.0}, {"time": "2026-04-02", "value": 54183.0}, {"time": "2026-04-03", "value": 54204.0}, {"time": "2026-04-06", "value": 54195.0}, {"time": "2026-04-07", "value": 54161.0}, {"time": "2026-04-08", "value": 54135.0}, {"time": "2026-04-09", "value": 54093.0}, {"time": "2026-04-10", "value": 54058.0}, {"time": "2026-04-13", "value": 54004.0}, {"time": "2026-04-14", "value": 54005.0}, {"time": "2026-04-15", "value": 53997.0}];
    const ma150Data = [{"time": "2026-03-27", "value": 50727.67}, {"time": "2026-03-30", "value": 50804.67}, {"time": "2026-03-31", "value": 50868.0}, {"time": "2026-04-01", "value": 50933.67}, {"time": "2026-04-02", "value": 50976.33}, {"time": "2026-04-03", "value": 51011.67}, {"time": "2026-04-06", "value": 51051.0}, {"time": "2026-04-07", "value": 51085.33}, {"time": "2026-04-08", "value": 51123.67}, {"time": "2026-04-09", "value": 51159.0}, {"time": "2026-04-10", "value": 51198.0}, {"time": "2026-04-13", "value": 51230.67}, {"time": "2026-04-14", "value": 51267.0}, {"time": "2026-04-15", "value": 51305.0}];
    const ma200Data = [{"time": "2026-03-27", "value": 48422.25}, {"time": "2026-03-30", "value": 48512.25}, {"time": "2026-03-31", "value": 48585.75}, {"time": "2026-04-01", "value": 48660.75}, {"time": "2026-04-02", "value": 48715.75}, {"time": "2026-04-03", "value": 48767.25}, {"time": "2026-04-06", "value": 48810.5}, {"time": "2026-04-07", "value": 48842.5}, {"time": "2026-04-08", "value": 48879.0}, {"time": "2026-04-09", "value": 48913.25}, {"time": "2026-04-10", "value": 48950.0}, {"time": "2026-04-13", "value": 48985.25}, {"time": "2026-04-14", "value": 49028.25}, {"time": "2026-04-15", "value": 49068.75}];
    const rsData = [{"time": "2026-03-27", "value": 73}, {"time": "2026-03-30", "value": 73}, {"time": "2026-03-31", "value": 75}, {"time": "2026-04-01", "value": 64}, {"time": "2026-04-02", "value": 66}, {"time": "2026-04-03", "value": 64}, {"time": "2026-04-06", "value": 62}, {"time": "2026-04-07", "value": 64}, {"time": "2026-04-08", "value": 61}, {"time": "2026-04-09", "value": 62}, {"time": "2026-04-10", "value": 58}, {"time": "2026-04-13", "value": 58}, {"time": "2026-04-14", "value": 61}, {"time": "2026-04-15", "value": 63}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
