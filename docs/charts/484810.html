<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>티엑스알로보틱스 (484810)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>티엑스알로보틱스 (484810)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-04-02", "open": 17040.0, "high": 17270.0, "low": 14930.0, "close": 15300.0}, {"time": "2026-04-03", "open": 16250.0, "high": 16290.0, "low": 15460.0, "close": 15940.0}, {"time": "2026-04-06", "open": 15700.0, "high": 15710.0, "low": 15120.0, "close": 15390.0}, {"time": "2026-04-07", "open": 15620.0, "high": 15790.0, "low": 15000.0, "close": 15160.0}, {"time": "2026-04-08", "open": 15820.0, "high": 16380.0, "low": 15630.0, "close": 16360.0}, {"time": "2026-04-09", "open": 16520.0, "high": 16610.0, "low": 16120.0, "close": 16550.0}, {"time": "2026-04-10", "open": 16630.0, "high": 16660.0, "low": 16200.0, "close": 16430.0}, {"time": "2026-04-13", "open": 15950.0, "high": 17000.0, "low": 15800.0, "close": 15980.0}, {"time": "2026-04-14", "open": 16220.0, "high": 17410.0, "low": 16220.0, "close": 16810.0}, {"time": "2026-04-15", "open": 17240.0, "high": 17330.0, "low": 16810.0, "close": 16920.0}, {"time": "2026-04-16", "open": 17280.0, "high": 17500.0, "low": 17100.0, "close": 17200.0}, {"time": "2026-04-17", "open": 17590.0, "high": 17780.0, "low": 17210.0, "close": 17410.0}];
    const ma50Data = [{"time": "2026-04-02", "value": 18067.6}, {"time": "2026-04-03", "value": 17991.2}, {"time": "2026-04-06", "value": 17921.0}, {"time": "2026-04-07", "value": 17816.2}, {"time": "2026-04-08", "value": 17652.4}, {"time": "2026-04-09", "value": 17562.4}, {"time": "2026-04-10", "value": 17451.0}, {"time": "2026-04-13", "value": 17348.6}, {"time": "2026-04-14", "value": 17263.8}, {"time": "2026-04-15", "value": 17186.2}, {"time": "2026-04-16", "value": 17103.2}, {"time": "2026-04-17", "value": 17045.4}];
    const ma150Data = [{"time": "2026-04-02", "value": 16470.13}, {"time": "2026-04-03", "value": 16501.27}, {"time": "2026-04-06", "value": 16530.33}, {"time": "2026-04-07", "value": 16556.4}, {"time": "2026-04-08", "value": 16585.87}, {"time": "2026-04-09", "value": 16612.47}, {"time": "2026-04-10", "value": 16640.0}, {"time": "2026-04-13", "value": 16664.73}, {"time": "2026-04-14", "value": 16695.47}, {"time": "2026-04-15", "value": 16721.4}, {"time": "2026-04-16", "value": 16740.93}, {"time": "2026-04-17", "value": 16764.53}];
    const ma200Data = [{"time": "2026-04-02", "value": 15938.2}, {"time": "2026-04-03", "value": 15934.8}, {"time": "2026-04-06", "value": 15929.1}, {"time": "2026-04-07", "value": 15922.95}, {"time": "2026-04-08", "value": 15923.75}, {"time": "2026-04-09", "value": 15925.55}, {"time": "2026-04-10", "value": 15926.25}, {"time": "2026-04-13", "value": 15925.35}, {"time": "2026-04-14", "value": 15929.15}, {"time": "2026-04-15", "value": 15932.85}, {"time": "2026-04-16", "value": 15935.75}, {"time": "2026-04-17", "value": 15939.15}];
    const rsData = [{"time": "2026-04-02", "value": 21}, {"time": "2026-04-03", "value": 31}, {"time": "2026-04-06", "value": 24}, {"time": "2026-04-07", "value": 18}, {"time": "2026-04-08", "value": 31}, {"time": "2026-04-09", "value": 24}, {"time": "2026-04-10", "value": 24}, {"time": "2026-04-13", "value": 18}, {"time": "2026-04-14", "value": 21}, {"time": "2026-04-15", "value": 13}, {"time": "2026-04-16", "value": 15}, {"time": "2026-04-17", "value": 17}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
