<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>티씨머티리얼즈 (125020)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>티씨머티리얼즈 (125020)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-05-28", "open": 8650.0, "high": 8730.0, "low": 7520.0, "close": 8120.0}, {"time": "2026-05-29", "open": 8150.0, "high": 8150.0, "low": 7290.0, "close": 7400.0}, {"time": "2026-06-01", "open": 7290.0, "high": 7470.0, "low": 6980.0, "close": 7010.0}, {"time": "2026-06-02", "open": 7020.0, "high": 7250.0, "low": 6500.0, "close": 7180.0}, {"time": "2026-06-04", "open": 7050.0, "high": 7680.0, "low": 6890.0, "close": 7310.0}, {"time": "2026-06-05", "open": 6910.0, "high": 7130.0, "low": 6650.0, "close": 6970.0}, {"time": "2026-06-08", "open": 6200.0, "high": 6940.0, "low": 6120.0, "close": 6420.0}, {"time": "2026-06-09", "open": 6670.0, "high": 7330.0, "low": 6660.0, "close": 7030.0}, {"time": "2026-06-10", "open": 7010.0, "high": 7600.0, "low": 6800.0, "close": 7070.0}, {"time": "2026-06-11", "open": 6920.0, "high": 7090.0, "low": 6460.0, "close": 7020.0}, {"time": "2026-06-12", "open": 7210.0, "high": 7410.0, "low": 6700.0, "close": 6830.0}, {"time": "2026-06-15", "open": 7040.0, "high": 7190.0, "low": 6860.0, "close": 6990.0}];
    const ma50Data = [{"time": "2026-05-28", "value": 6314.9}, {"time": "2026-05-29", "value": 6345.7}, {"time": "2026-06-01", "value": 6371.5}, {"time": "2026-06-02", "value": 6406.7}, {"time": "2026-06-04", "value": 6443.5}, {"time": "2026-06-05", "value": 6484.5}, {"time": "2026-06-08", "value": 6512.5}, {"time": "2026-06-09", "value": 6550.3}, {"time": "2026-06-10", "value": 6593.4}, {"time": "2026-06-11", "value": 6637.5}, {"time": "2026-06-12", "value": 6680.8}, {"time": "2026-06-15", "value": 6726.3}];
    const ma150Data = [{"time": "2026-05-28", "value": 4979.67}, {"time": "2026-05-29", "value": 5000.57}, {"time": "2026-06-01", "value": 5018.77}, {"time": "2026-06-02", "value": 5038.47}, {"time": "2026-06-04", "value": 5059.4}, {"time": "2026-06-05", "value": 5078.27}, {"time": "2026-06-08", "value": 5092.3}, {"time": "2026-06-09", "value": 5111.03}, {"time": "2026-06-10", "value": 5129.47}, {"time": "2026-06-11", "value": 5148.13}, {"time": "2026-06-12", "value": 5166.93}, {"time": "2026-06-15", "value": 5186.53}];
    const ma200Data = [{"time": "2026-05-28", "value": 4899.38}, {"time": "2026-05-29", "value": 4909.02}, {"time": "2026-06-01", "value": 4918.68}, {"time": "2026-06-02", "value": 4929.23}, {"time": "2026-06-04", "value": 4940.18}, {"time": "2026-06-05", "value": 4949.32}, {"time": "2026-06-08", "value": 4954.73}, {"time": "2026-06-09", "value": 4963.07}, {"time": "2026-06-10", "value": 4971.98}, {"time": "2026-06-11", "value": 4980.62}, {"time": "2026-06-12", "value": 4988.52}, {"time": "2026-06-15", "value": 4997.27}];
    const rsData = [{"time": "2026-05-28", "value": 85}, {"time": "2026-05-29", "value": 83}, {"time": "2026-06-01", "value": 82}, {"time": "2026-06-02", "value": 84}, {"time": "2026-06-04", "value": 84}, {"time": "2026-06-05", "value": 83}, {"time": "2026-06-08", "value": 84}, {"time": "2026-06-09", "value": 85}, {"time": "2026-06-10", "value": 83}, {"time": "2026-06-11", "value": 82}, {"time": "2026-06-12", "value": 81}, {"time": "2026-06-15", "value": 81}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
