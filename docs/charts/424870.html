<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이뮨온시아 (424870)</title>
  <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #ffffff;
      color: #333333;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .masthead {
      padding: 12px 16px;
      background: #93c7c4;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .masthead .site-title {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .masthead .site-title:hover { opacity: 0.85; }
    .toolbar {
      padding: 6px 16px;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #333333;
    }
    .toolbar a {
      color: #2196f3;
      text-decoration: none;
      font-size: 13px;
    }
    .toolbar a:hover { text-decoration: underline; }
    .chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-bottom: 1px solid #e0e3eb;
      flex-shrink: 0;
    }
    .chart-container {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    #candle-chart {
      height: calc(60vh - 40px);
    }
    .divider {
      height: 4px;
      background: #e0e3eb;
    }
    #rs-chart-label {
      padding: 4px 16px;
      font-size: 11px;
      color: #787b86;
      background: #f8f9fa;
      border-top: 1px solid #e0e3eb;
    }
    #rs-chart {
      height: calc(40vh - 40px);
    }
    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
    }
    .legend-dot {
      width: 10px;
      height: 3px;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="masthead">
    <a href="../" class="site-title">달리나음의 상대 강도</a>
  </div>
  <div class="toolbar">
    <a href="../">&larr; 목록</a>
    <h1>이뮨온시아 (424870)</h1>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#2196f3"></div>MA50</div>
      <div class="legend-item"><div class="legend-dot" style="background:#ff9800"></div>MA150</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f44336"></div>MA200</div>
    </div>
  </div>
  <div class="chart-label">캔들차트 + 이동평균</div>
  <div class="chart-container">
    <div id="candle-chart"></div>
    <div class="divider"></div>
    <div id="rs-chart-label">RS 백분위 추이</div>
    <div id="rs-chart"></div>
  </div>

  <script>
    const candleData = [{"time": "2026-06-01", "open": 6090.0, "high": 6090.0, "low": 5500.0, "close": 5690.0}, {"time": "2026-06-02", "open": 5380.0, "high": 5500.0, "low": 5210.0, "close": 5250.0}, {"time": "2026-06-04", "open": 4780.0, "high": 4870.0, "low": 4400.0, "close": 4425.0}, {"time": "2026-06-05", "open": 4520.0, "high": 4630.0, "low": 4365.0, "close": 4490.0}, {"time": "2026-06-08", "open": 4095.0, "high": 4240.0, "low": 3890.0, "close": 3950.0}, {"time": "2026-06-09", "open": 4000.0, "high": 4225.0, "low": 3935.0, "close": 4165.0}, {"time": "2026-06-10", "open": 4130.0, "high": 4250.0, "low": 3980.0, "close": 4145.0}, {"time": "2026-06-11", "open": 3995.0, "high": 4180.0, "low": 3915.0, "close": 4175.0}, {"time": "2026-06-12", "open": 4290.0, "high": 4375.0, "low": 4210.0, "close": 4220.0}, {"time": "2026-06-15", "open": 4340.0, "high": 4450.0, "low": 4175.0, "close": 4230.0}, {"time": "2026-06-16", "open": 4235.0, "high": 4395.0, "low": 4130.0, "close": 4195.0}, {"time": "2026-06-17", "open": 4195.0, "high": 4615.0, "low": 4095.0, "close": 4400.0}];
    const ma50Data = [{"time": "2026-06-01", "value": 7043.66}, {"time": "2026-06-02", "value": 6985.12}, {"time": "2026-06-04", "value": 6906.04}, {"time": "2026-06-05", "value": 6840.18}, {"time": "2026-06-08", "value": 6757.94}, {"time": "2026-06-09", "value": 6680.58}, {"time": "2026-06-10", "value": 6600.9}, {"time": "2026-06-11", "value": 6496.62}, {"time": "2026-06-12", "value": 6409.78}, {"time": "2026-06-15", "value": 6329.5}, {"time": "2026-06-16", "value": 6243.9}, {"time": "2026-06-17", "value": 6179.7}];
    const ma150Data = [{"time": "2026-06-01", "value": 8471.85}, {"time": "2026-06-02", "value": 8468.31}, {"time": "2026-06-04", "value": 8459.77}, {"time": "2026-06-05", "value": 8451.67}, {"time": "2026-06-08", "value": 8440.49}, {"time": "2026-06-09", "value": 8428.94}, {"time": "2026-06-10", "value": 8418.09}, {"time": "2026-06-11", "value": 8408.28}, {"time": "2026-06-12", "value": 8399.15}, {"time": "2026-06-15", "value": 8389.9}, {"time": "2026-06-16", "value": 8379.19}, {"time": "2026-06-17", "value": 8370.24}];
    const ma200Data = [{"time": "2026-06-01", "value": 7708.17}, {"time": "2026-06-02", "value": 7708.78}, {"time": "2026-06-04", "value": 7705.27}, {"time": "2026-06-05", "value": 7702.23}, {"time": "2026-06-08", "value": 7696.93}, {"time": "2026-06-09", "value": 7693.31}, {"time": "2026-06-10", "value": 7689.22}, {"time": "2026-06-11", "value": 7685.52}, {"time": "2026-06-12", "value": 7681.94}, {"time": "2026-06-15", "value": 7677.26}, {"time": "2026-06-16", "value": 7672.02}, {"time": "2026-06-17", "value": 7669.35}];
    const rsData = [{"time": "2026-06-01", "value": 31}, {"time": "2026-06-02", "value": 32}, {"time": "2026-06-04", "value": 21}, {"time": "2026-06-05", "value": 29}, {"time": "2026-06-08", "value": 42}, {"time": "2026-06-09", "value": 43}, {"time": "2026-06-10", "value": 32}, {"time": "2026-06-11", "value": 39}, {"time": "2026-06-12", "value": 28}, {"time": "2026-06-15", "value": 30}, {"time": "2026-06-16", "value": 34}, {"time": "2026-06-17", "value": 45}];

    const chartOptions = {
      layout: {
        background: { color: '#ffffff' },
        textColor: '#333333',
      },
      grid: {
        vertLines: { color: '#e0e3eb' },
        horzLines: { color: '#e0e3eb' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor: '#d1d4dc' },
      timeScale: { borderColor: '#d1d4dc', timeVisible: true, fixLeftEdge: true, fixRightEdge: true },
    };

    // 캔들차트
    const candleEl = document.getElementById('candle-chart');
    const candleChart = LightweightCharts.createChart(candleEl, {
      ...chartOptions,
      autoSize: true,
    });

    const candleSeries = candleChart.addSeries(LightweightCharts.CandlestickSeries, {
      upColor: '#ef5350',
      downColor: '#2196f3',
      borderDownColor: '#2196f3',
      borderUpColor: '#ef5350',
      wickDownColor: '#2196f3',
      wickUpColor: '#ef5350',
    });
    candleSeries.setData(candleData);

    const ma50Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#2196f3', lineWidth: 1, priceLineVisible: false });
    ma50Series.setData(ma50Data);

    const ma150Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#ff9800', lineWidth: 1, priceLineVisible: false });
    ma150Series.setData(ma150Data);

    const ma200Series = candleChart.addSeries(LightweightCharts.LineSeries, { color: '#f44336', lineWidth: 1, priceLineVisible: false });
    ma200Series.setData(ma200Data);

    candleChart.timeScale().fitContent();

    // RS 점수 차트
    const rsEl = document.getElementById('rs-chart');
    const rsChart = LightweightCharts.createChart(rsEl, {
      ...chartOptions,
      autoSize: true,
    });

    const rsSeries = rsChart.addSeries(LightweightCharts.LineSeries, {
      color: '#7b1fa2',
      lineWidth: 2,
      priceLineVisible: false,
    });
    rsSeries.setData(rsData);
    rsChart.timeScale().fitContent();

    // 두 차트 시간축 동기화 (같은 날짜 범위이므로 logical range 사용)
    let syncing = false;
    candleChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      rsChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
    rsChart.timeScale().subscribeVisibleLogicalRangeChange(range => {
      if (syncing || !range) return;
      syncing = true;
      candleChart.timeScale().setVisibleLogicalRange(range);
      syncing = false;
    });
  </script>
</body>
</html>
